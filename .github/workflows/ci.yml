name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test (Oban OSS)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-deps-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build/test
          key: ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-build-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-build-test-

      - name: Strip oban_pro from mix.lock
        # oban_pro is locked in mix.lock from local :dev builds. Although our
        # mix.exs doesn't declare it for :test, Mix still validates lock
        # entries against their declared repo (`oban`, private). We remove
        # the stale entry for this CI run — mix.lock is never written back.
        run: sed -i '/^  "oban_pro":/d' mix.lock

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
